<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Portfolio Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-900 flex items-center justify-center" style="font-family: 'Inter', sans-serif;">
    <div class="w-full max-w-sm mx-auto">
        <div class="bg-slate-800 rounded-xl shadow-xl border border-slate-700 p-8">
            <div class="text-center mb-8">
                <h1 class="text-xl font-bold text-white mb-2">Portfolio Monitor</h1>
                <p class="text-sm text-slate-400">Sign in to continue</p>
            </div>

            {% if oauth_configured %}
            <a href="/auth/login"
               class="flex items-center justify-center gap-3 w-full px-4 py-3 bg-white text-slate-800 font-medium text-sm rounded-lg hover:bg-slate-100 transition-colors no-underline">
                <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Sign in with Google
            </a>
            {% else %}
            <div class="text-center text-slate-400 text-sm">
                <p class="mb-2">Google OAuth is not configured.</p>
                <p>Set <code class="bg-slate-700 px-1.5 py-0.5 rounded text-xs text-slate-300">GOOGLE_OAUTH_CLIENT_ID</code> and
                   <code class="bg-slate-700 px-1.5 py-0.5 rounded text-xs text-slate-300">GOOGLE_OAUTH_CLIENT_SECRET</code>
                   in your .env file.</p>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>

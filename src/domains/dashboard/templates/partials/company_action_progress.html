{% if error %}
<div class="rounded border p-3 text-sm"
     style="background: #fee2e2; border-color: #fca5a5; color: #b91c1c;">
  {{ error }}
</div>
{% endif %}

{% if task %}
<div class="card p-4" id="company-action-{{ task.task_id }}">
  <div class="flex items-center gap-3 mb-3">
    <svg class="animate-spin h-5 w-5 flex-shrink-0" style="color: var(--accent-blue)"
         xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
      </path>
    </svg>
    <span class="text-sm font-medium" style="color: var(--text-primary)">
      Running: <span class="font-mono">{{ task.display_command }}</span>
    </span>
  </div>

  <div class="terminal-output bg-gray-900 text-green-400 font-mono text-xs p-3 rounded max-h-48 overflow-y-auto"
       hx-ext="sse"
       sse-connect="/operations/tasks/{{ task.task_id }}/stream"
       sse-swap="output"
       sse-close="done"
       hx-swap="beforeend">
  </div>

  {# Poll every 2s; when task is done the endpoint returns HX-Refresh: true #}
  <div hx-get="/operations/tasks/{{ task.task_id }}/poll"
       hx-trigger="every 2s"
       hx-swap="none"
       style="display:none">
  </div>
</div>
{% endif %}

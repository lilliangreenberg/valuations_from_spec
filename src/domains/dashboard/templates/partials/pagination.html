{# Reusable pagination partial.
   Expects: page, total_pages, total, and base_url in context. #}

{% if total_pages > 1 %}
<nav class="flex items-center justify-between mt-6 pt-4 border-t border-gray-200 dark:border-gray-700">
  <div class="text-sm text-gray-500 dark:text-gray-400">
    Page {{ page }} of {{ total_pages }} ({{ total }} total)
  </div>
  <div class="flex items-center gap-2">
    <button type="button"
            class="px-3 py-1.5 text-sm font-medium rounded border
                   {% if page <= 1 %}
                     bg-gray-100 dark:bg-gray-700 text-gray-400 dark:text-gray-500 border-gray-200 dark:border-gray-600 cursor-not-allowed
                   {% else %}
                     bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 border-gray-300 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-750
                   {% endif %}"
            {% if page > 1 %}
              hx-get="{{ base_url }}?page={{ page - 1 }}"
              hx-target="closest [id]"
              hx-include="[name]"
            {% else %}
              disabled
            {% endif %}>
      Previous
    </button>
    <button type="button"
            class="px-3 py-1.5 text-sm font-medium rounded border
                   {% if page >= total_pages %}
                     bg-gray-100 dark:bg-gray-700 text-gray-400 dark:text-gray-500 border-gray-200 dark:border-gray-600 cursor-not-allowed
                   {% else %}
                     bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 border-gray-300 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-750
                   {% endif %}"
            {% if page < total_pages %}
              hx-get="{{ base_url }}?page={{ page + 1 }}"
              hx-target="closest [id]"
              hx-include="[name]"
            {% else %}
              disabled
            {% endif %}>
      Next
    </button>
  </div>
</nav>
{% endif %}

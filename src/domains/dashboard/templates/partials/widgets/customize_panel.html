<div id="customize-panel" class="customize-panel" style="display: none;">
  <div class="customize-panel-header">
    <h3 class="customize-panel-title">Customize Dashboard</h3>
    <button onclick="closeCustomizePanel()" class="customize-close-btn">&times;</button>
  </div>

  <div class="customize-section">
    <label class="customize-label">Layout Preset</label>
    <div class="customize-presets">
      {% for preset_id, preset in layout_presets.items() %}
      <button class="preset-btn" data-preset="{{ preset_id }}" onclick="selectPreset('{{ preset_id }}')">
        <span class="preset-name">{{ preset.label }}</span>
        <span class="preset-desc">{{ preset.description }}</span>
      </button>
      {% endfor %}
    </div>
  </div>

  <div class="customize-section">
    <label class="customize-label">Show / Hide Widgets</label>
    <div class="customize-toggles">
      {% for widget_id, widget_def in widget_registry.items() %}
      <label class="widget-toggle">
        <input type="checkbox"
               class="widget-toggle-input"
               data-widget-id="{{ widget_id }}"
               onchange="toggleWidget('{{ widget_id }}')"
               checked>
        <span class="widget-toggle-label">{{ widget_def.title }}</span>
      </label>
      {% endfor %}
    </div>
  </div>
</div>
